<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 3D 🎂</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow:hidden;
            font-family:'Poppins',sans-serif;
            background:radial-gradient(circle at top,#ffb6d9 0%,#ff5fa2 40%,#8b1e5b 100%);
        }

        #overlay{
            position:absolute;
            inset:0;
            display:flex;
            justify-content:center;
            align-items:center;
            backdrop-filter:blur(8px);
            background:rgba(0,0,0,0.2);
            z-index:10;
        }

        .card{
            width:430px;
            max-width:90%;
            padding:40px;
            border-radius:30px;
            background:rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.25);
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
            text-align:center;
            color:white;
            animation:float 4s ease-in-out infinite;
        }

        @keyframes float{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-12px);}
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
        }

        .subtitle{
            margin-bottom:30px;
            opacity:0.95;
        }

        input{
            width:100%;
            padding:18px;
            margin-bottom:18px;
            border:none;
            border-radius:18px;
            outline:none;
            font-size:17px;
            text-align:center;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:18px;
            background:linear-gradient(45deg,#ff4d6d,#ff758f);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 10px 30px rgba(255,77,109,0.4);
        }

        button:hover{
            transform:translateY(-3px) scale(1.03);
        }

        #hud{
            position:absolute;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            text-align:center;
            color:white;
            z-index:5;
            display:none;
        }

        #timer{
            font-size:48px;
            font-weight:bold;
            text-shadow:0 5px 15px rgba(0,0,0,0.4);
        }

        #instruction{
            font-size:18px;
            margin-top:10px;
        }

        canvas{
            display:block;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="card">
            <h1>🎂 Birthday Cake</h1>
            <p class="subtitle">
                Selamat ulang tahun tia :v
            </p>

            <input type="text" id="name" placeholder="Masukkan Nama">
            <input type="number" id="age" min="1" max="100" placeholder="Masukkan Umur">

            <button onclick="startCelebration()">
                ✨ Mulai Perayaan
            </button>
        </div>
    </div>

    <div id="hud">
        <div id="timer">10</div>
        <div id="instruction">
            🎤 Tiup lilin sebelum waktu habis!
        </div>
    </div>

    <audio id="music" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-happy-birthday-to-you-612.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer;
        let candles = [];
        let flames = [];
        let stars = [];
        let gameActive = false;
        let countdown;
        let timeLeft = 10;

        let userName = "";
        let userAge = 0;

        function startCelebration(){
            userName = document.getElementById("name").value.trim();
            userAge = parseInt(document.getElementById("age").value);

            if(userName === ""){
                alert("Masukkan nama terlebih dahulu!");
                return;
            }

            if(!userAge || userAge < 1){
                alert("Masukkan umur terlebih dahulu!");
                return;
            }

            document.getElementById("overlay").style.display = "none";
            document.getElementById("hud").style.display = "block";

            document.getElementById("music").play();

            init();
            createStars();
            createCake(userAge);
            setupMic();

            gameActive = true;
            startTimer();
        }

        function init(){
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                70,
                window.innerWidth/window.innerHeight,
                0.1,
                1000
            );

            camera.position.z = 8;
            camera.position.y = 1.5;

            renderer = new THREE.WebGLRenderer({
                antialias:true,
                alpha:true
            });

            renderer.setSize(window.innerWidth,window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff,0.8));

            const pinkLight = new THREE.PointLight(0xff69b4,3,50);
            pinkLight.position.set(5,5,5);
            scene.add(pinkLight);

            const goldLight = new THREE.PointLight(0xffd700,2,50);
            goldLight.position.set(-5,5,5);
            scene.add(goldLight);

            animate();
        }

        function createStars(){
            const geometry = new THREE.SphereGeometry(0.04,8,8);
            const material = new THREE.MeshBasicMaterial({color:0xffffff});

            for(let i=0;i<200;i++){
                const star = new THREE.Mesh(geometry,material);

                star.position.set(
                    (Math.random()-0.5)*30,
                    (Math.random()-0.5)*20,
                    (Math.random()-0.5)*30
                );

                scene.add(star);
                stars.push(star);
            }
        }

        function createCake(age){
            const cake = new THREE.Mesh(
                new THREE.CylinderGeometry(2,2,1.2,64),
                new THREE.MeshStandardMaterial({
                    color:0x8b4513
                })
            );
            scene.add(cake);

            const frosting = new THREE.Mesh(
                new THREE.CylinderGeometry(2.05,2.05,0.3,64),
                new THREE.MeshStandardMaterial({
                    color:0xfff0f5
                })
            );
            frosting.position.y = 0.75;
            scene.add(frosting);

            for(let i=0;i<age;i++){
                const candle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06,0.06,0.8,16),
                    new THREE.MeshStandardMaterial({
                        color:Math.random()*0xffffff
                    })
                );

                const angle = (i/age)*Math.PI*2;

                candle.position.set(
                    Math.cos(angle)*1.3,
                    1.3,
                    Math.sin(angle)*1.3
                );

                scene.add(candle);
                candles.push(candle);

                const flame = new THREE.Mesh(
                    new THREE.SphereGeometry(0.12,16,16),
                    new THREE.MeshBasicMaterial({
                        color:0xffcc00,
                        transparent:true,
                        opacity:0.9
                    })
                );

                flame.position.y = 0.5;
                candle.add(flame);
                flames.push(flame);

                const glow = new THREE.PointLight(0xffaa00,1.5,4);
                glow.position.y = 0.5;
                candle.add(glow);
            }
        }

        function animate(){
            requestAnimationFrame(animate);

            scene.rotation.y += 0.003;

            stars.forEach(star=>{
                star.position.y -= 0.02;
                if(star.position.y < -10){
                    star.position.y = 10;
                }
            });

            flames.forEach(flame=>{
                flame.scale.y = 1 + Math.random()*0.5;
                flame.material.opacity = 0.6 + Math.random()*0.4;
            });

            renderer.render(scene,camera);
        }

        function setupMic(){
            navigator.mediaDevices.getUserMedia({audio:true})
                .then(stream=>{
                    const audioContext = new AudioContext();
                    const mic = audioContext.createMediaStreamSource(stream);
                    const analyser = audioContext.createAnalyser();

                    analyser.fftSize = 256;
                    mic.connect(analyser);

                    const data = new Uint8Array(analyser.frequencyBinCount);

                    function detect(){
                        analyser.getByteFrequencyData(data);

                        const volume =
                            data.reduce((a,b)=>a+b,0)/data.length;

                        if(volume > 65 && gameActive){
                            blowCandles();
                        }

                        requestAnimationFrame(detect);
                    }

                    detect();
                });
        }

        function blowCandles(){
            if(!gameActive) return;

            flames.forEach(flame=>{
                if(flame.parent){
                    flame.parent.remove(flame);
                }
            });

            flames = [];
            gameActive = false;
            clearInterval(countdown);

            launchConfetti();

            setTimeout(()=>{
                alert(`🎉 Selamat Ulang Tahun yang ke-${userAge}, ${userName}! 🎂✨`);
            },500);
        }

        function startTimer(){
            timeLeft = 10;
            document.getElementById("timer").textContent = timeLeft;

            countdown = setInterval(()=>{
                timeLeft--;

                document.getElementById("timer").textContent = timeLeft;

                if(timeLeft <= 0){
                    clearInterval(countdown);

                    if(gameActive){
                        gameActive = false;
                        alert("😢 Waktu habis! Coba lagi.");
                    }
                }
            },1000);
        }

        function launchConfetti(){
            for(let i=0;i<300;i++){
                const confetti = document.createElement("div");

                confetti.style.position = "absolute";
                confetti.style.width = "8px";
                confetti.style.height = "8px";
                confetti.style.left = Math.random()*100 + "vw";
                confetti.style.top = "-10px";
                confetti.style.background =
                    `hsl(${Math.random()*360},100%,50%)`;
                confetti.style.borderRadius = "50%";
                confetti.style.pointerEvents = "none";
                confetti.style.zIndex = "999";

                document.body.appendChild(confetti);

                confetti.animate([
                    {
                        transform:'translateY(0) rotate(0deg)'
                    },
                    {
                        transform:`translateY(${window.innerHeight+100}px)
                                   rotate(${Math.random()*720}deg)`
                    }
                ],{
                    duration:3000 + Math.random()*2000,
                    easing:'linear'
                });

                setTimeout(()=>confetti.remove(),5000);
            }
        }
    </script>

</body>
</html>
